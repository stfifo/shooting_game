<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Strikers 1945+</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace}
#wrap{width:480px}
#topBar{display:flex;justify-content:space-between;padding:5px 10px;font-size:13px;letter-spacing:1px;color:#cc9900;background:#0a0800;border:1px solid #332200;border-bottom:none}
canvas{display:block;image-rendering:pixelated;border:2px solid #332200}
#botBar{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:#0a0800;border:1px solid #332200;border-top:none;gap:6px;flex-wrap:wrap}
.hg{display:flex;align-items:center;gap:4px}
.hl{font-size:9px;color:#442200;letter-spacing:1px;white-space:nowrap}
#livesEl{color:#5af;font-size:14px;letter-spacing:4px;min-width:72px}
#bombsEl{color:#f80;font-size:13px;letter-spacing:3px;min-width:36px}
#skillWrap{width:60px;height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;border:1px solid #333}
#skillFill{height:100%;width:0%;background:linear-gradient(90deg,#f40,#ff0);transition:width .1s}
#wpName{font-size:11px;color:#ff8;min-width:56px}
#ghostEl{font-size:11px;color:#8df;min-width:52px}
#keyBar{display:flex;align-items:center;justify-content:center;gap:16px;padding:6px 10px;background:#060606;border:1px solid #1a1a1a;border-top:none}
#dpad{display:grid;grid-template-areas:'. ku .' 'kl kd kr';grid-template-columns:repeat(3,24px);gap:2px}
#actkeys{display:flex;gap:5px;align-items:center}
.key{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;min-width:24px;height:30px;padding:0 5px;font-size:10px;font-weight:bold;color:#333;background:#0d0d0d;border:1px solid #242424;border-bottom:2px solid #2e2e2e;border-radius:3px;font-family:'Courier New',monospace;transition:color .06s,background .06s,border-color .06s,box-shadow .06s;line-height:1.1;text-align:center;user-select:none}
.key small{font-size:7px;color:#2b2b2b;font-weight:normal;transition:color .06s;letter-spacing:.3px}
.key.active{color:#ffdd00;background:#1c1200;border-color:#bb6600;border-bottom-color:#ffcc00;box-shadow:0 0 8px #ff880044}
.key.active small{color:#bb6600}
#ku{grid-area:ku}#kl{grid-area:kl}#kd{grid-area:kd}#kr{grid-area:kr}
.key.wide{min-width:46px}
</style>
</head>
<body>
<div id="wrap">
  <div id="topBar">
    <span>SCORE <span id="scoreEl">00000000</span></span>
    <span>WAVE <span id="waveEl">-</span></span>
    <span>HI <span id="hiEl">00000000</span></span>
  </div>
  <canvas id="canvas" width="480" height="600"></canvas>
  <div id="botBar">
    <div class="hg"><span class="hl">LIFE</span><div id="livesEl"></div></div>
    <div class="hg"><span class="hl">BOMB[Z]</span><div id="bombsEl"></div></div>
    <div class="hg"><span class="hl">SKILL[X]</span><div id="skillWrap"><div id="skillFill"></div></div></div>
    <div class="hg"><span class="hl">WPN</span><div id="wpName">SINGLE</div></div>
    <div class="hg"><span class="hl">WING</span><div id="ghostEl">-</div></div>
  </div>
  <div id="keyBar">
    <div id="dpad">
      <span class="key" id="ku">↑</span>
      <span class="key" id="kl">←</span>
      <span class="key" id="kd">↓</span>
      <span class="key" id="kr">→</span>
    </div>
    <div id="actkeys">
      <span class="key" id="k-z">Z<br><small>BOMB</small></span>
      <span class="key" id="k-x">X<br><small>SKILL</small></span>
      <span class="key" id="k-p">P<br><small>PAUSE</small></span>
      <span class="key wide" id="k-start">ENTER<br><small>START</small></span>
    </div>
  </div>
</div>
<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/sprites.js"></script>
<script src="js/background.js"></script>
<script src="js/player.js"></script>
<script src="js/abilities.js"></script>
<script src="js/enemies.js"></script>
<script src="js/bullets.js"></script>
<script src="js/formations.js"></script>
<script src="js/boss.js"></script>
<script src="js/waves.js"></script>
<script src="js/items.js"></script>
<script src="js/particles.js"></script>
<script src="js/collisions.js"></script>
<script src="js/hud.js"></script>
<script src="js/game.js"></script>
</body>
</html>
